[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ordenação de execução por arquivo (assessment → migration → validation → rollback → integration)
addopts =
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:coverage_report
    -p no:warnings

# Marcadores customizados
markers =
    unit: testes unitários sem Spark
    spark: testes que usam SparkSession local
    integration: testes de integração end-to-end
    slow: testes lentos (opcionalmente pulados com -m "not slow")
